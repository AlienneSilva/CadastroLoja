<!DOCTYPE html>
<html lang="pt-BR">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<head>
    <meta charset="UTF-8">
    <title>Despesas</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cadastro.css') }}">


</head>

<body>
    <div class="form">

        <h1>
           Cadastro Despesas
        </h1>

        <form class="form_grupo" action="/gravar_despesa" method="POST">
            <div>

                <input type="date" name="data" class="form_input" value="{{ data_hoje }}" required>
            </div>
     
            </br>



            <select name="categoria" class="form_input" required>
                <option value="" selected disabled>
                    Selecione um categoria
                </option>

                <option value="ADS">ADS</option>

                <option value="Frete">Frete</option>

                <option value="Energia">Energia</option>

                <option value="Internet">Internet</option>

                <option value="Outros">Outros</option>

            </select>

            </br>
            </br>
            <input type="text" name="descricao" placeholder="Descrição" class="form_input" required>

            </br>
            </br>

            <input type="number" step="0.01" min="0" name="valor"  placeholder="Valor" class="form_input" required>

            </br>
            </br>

            <button type="submit">
                Salvar
            </button>

            <a href="{{ url_for('inicio') }}">

                <button class="action" type="button">

                    Voltar

                </button>

            </a>

        </form>
    </div>
</body>

</html>
